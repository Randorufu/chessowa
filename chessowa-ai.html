<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Chess'owa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0b0b14;
            color: #eee;
            font-family: sans-serif;
            text-align: center;
        }

        #themeToggle {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 200;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 20px;
        }

        .switch input {
            display: none;
        }

        .switchtxt {
            position: relative;
            top: -3px;
            padding-right: 3px;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 34px;
        }


        .slider:before {
            content: "";
            position: absolute;
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #1e90ff;
        }

        input:checked+.slider:before {
            transform: translateX(11px);
        }

        h1 {
            font-family: "Manufacturing Consent", system-ui;
            font-size: 50px;
            font-weight: 400;
            font-style: normal;
        }

        b {
            font-family: "Manufacturing Consent", system-ui;
            font-size: 30px;
            font-weight: 400;
            font-style: normal;
        }
        
        #playerLastSpell b, #aiLastSpell b {
            font-family: sans-serif;
            font-size: 16px;
        }

        #game {
            display: grid;
            grid-template-columns: 260px auto 260px;
            gap: 10px;
            padding: 10px;
        }

        .panel {
            background: #161622;
            padding: 10px;
            border-radius: 10px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 72px);
            gap: 2px;
            margin: auto;
        }

        .cell {
            width: 72px;
            height: 72px;
            background: #17171c;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
        }

        .cell:nth-child(1),
        .cell:nth-child(3),
        .cell:nth-child(5),
        .cell:nth-child(7),
        .cell:nth-child(10),
        .cell:nth-child(12),
        .cell:nth-child(14),
        .cell:nth-child(16),
        .cell:nth-child(17),
        .cell:nth-child(19),
        .cell:nth-child(21),
        .cell:nth-child(23),
        .cell:nth-child(26),
        .cell:nth-child(28),
        .cell:nth-child(30),
        .cell:nth-child(32),
        .cell:nth-child(33),
        .cell:nth-child(35),
        .cell:nth-child(37),
        .cell:nth-child(39),
        .cell:nth-child(42),
        .cell:nth-child(44),
        .cell:nth-child(46),
        .cell:nth-child(48),
        .cell:nth-child(49),
        .cell:nth-child(51),
        .cell:nth-child(53),
        .cell:nth-child(55),
        .cell:nth-child(58),
        .cell:nth-child(60),
        .cell:nth-child(62),
        .cell:nth-child(64),
        .cell:nth-child(66) {
            background: #1d1d27;
        }

        .cell.player {
            color: #9fd3ff;
        }

        .cell.ai {
            color: #ff9f9f;
        }

        .icon {
            width: 72px;
            height: 72px;
        }

        .icon img {
            width: 72px;
            height: 72px;
        }

        #playerGraveyard span img {
            cursor: pointer;
        }

        .atk {
            font-size: 13px;
            padding: 0;
            margin: 0;
            z-index: +1;
            margin-top: -16px;
            font-weight: bold;
        }

        .handatk {
            font-size: 12px;
            margin-top: -13.6px;
        }

        .graveyardatk {
            font-size: 12px;
            margin-top: -14px;
            width: 60px;
        }

        .graveIcon {
            width: 60px;
            display: inline-block;
            padding: 3px;
        }

        button {
            border: 1px solid #444;
            padding: 6px;
            margin: 3px;
            border-radius: 6px;
            position: relative;
            color: rgb(207, 248, 255);
            border: 3px solid transparent;
            border-radius: 10px;
            background-color: rgb(42, 42, 61);
            background-image: linear-gradient(to bottom right, rgb(29, 39, 39), rgb(2, 10, 14)), linear-gradient(125deg, rgba(11, 11, 20, 0) 45%, rgba(11, 11, 20, 0.6) 50%, rgba(11, 11, 20, 0) 53%);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            background-size: 100%, 200%;
            background-position: 0px, -250px;
            box-shadow: rgba(0, 0, 0, 0.6) 8px 8px 8px;
            text-shadow: 0px 0px 4px rgba(255, 255, 255, 0.1);
            transition: box-shadow 0.25s, text-shaddw 0.25s;
            overflow: hidden;
        }

        .glint {
            background-image: linear-gradient(to bottom right, rgb(11, 11, 20), rgb(2, 10, 14)), linear-gradient(125deg, rgba(255, 255, 255, 0) 45%, rgba(255, 255, 255, 0.6) 50%, rgba(255, 255, 255, 0)53%);
            animation: 6s border-glint linear backwards infinite;
        }

        .handpadding {
            padding: 0;
        }

        .selected {
            outline: 2px solid gold;
        }

        .damage-popup {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.6);
            font-size: 64px;
            font-weight: 600;
            opacity: 0;
            transition: all .4s ease;
            pointer-events: none;
            z-index: 99;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0));
            padding: 0px 30px 10px 30px;
            border-width: 2px;
            border-style: solid;
            border-image: linear-gradient(to right, rgba(30, 144, 255, 0), rgba(30, 144, 255, 0.5), rgba(30, 144, 255, 0.8), rgba(30, 144, 255, 0.5), rgba(30, 144, 255, 0)) 1;
        }

        .damage-popup.show {
            opacity: 1;
            transform: translate(-50%, -70%) scale(1);
        }

        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: +1;
        }

        #modal div {
            background: #161622;
            padding: 20px;
            border-radius: 10px;
        }

        .graveyard span {
            font-size: 20px;
            margin: 2px;
        }

        .popup {
            position: fixed;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            pointer-events: none;
            z-index: 1;
        }

        .shiny-button {
            position: relative;
            color: rgb(207, 248, 255);
            border: 3px solid transparent;
            border-radius: 10px;
            background-color: rgb(6, 69, 73);
            background-image: linear-gradient(to bottom right, rgb(10, 107, 115), rgb(2, 10, 14)), linear-gradient(125deg, rgba(255, 255, 255, 0) 45%, rgba(255, 255, 255, 0.6) 50%, rgba(255, 255, 255, 0) 53%);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            background-size: 100%, 200%;
            background-position: 0px, -250px;
            animation: 6s border-glint linear backwards infinite;
            box-shadow: rgba(0, 0, 0, 0.6) 8px 8px 8px;
            text-shadow: 0px 0px 4px rgba(255, 255, 255, 0.1);
            transition: box-shadow 0.25s, text-shaddw 0.25s;
            overflow: hidden;
        }

        .shiny-button:hover {
            cursor: pointer;
            background-image: linear-gradient(to bottom right, rgb(24, 77, 177), rgb(24, 77, 177)), linear-gradient(125deg, rgba(255, 255, 255, 0) 45%, rgba(255, 255, 255, 0.6) 50%, rgba(255, 255, 255, 0) 53%);
            color: rgb(250, 250, 255);
            box-shadow: rgba(0, 0, 0, 0.7) 5px 5px 5px;
            text-shadow: 0px 0px 3px rgba(255, 255, 255, 0.7);
            transition: box-shadow 0.25s, text-shaddw 0.25s;
        }

        .shiny-button::after {
            content: ' ';
            position: absolute;
            top: -50%;
            left: -120%;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(125deg, rgba(255, 255, 255, 0) 30%, rgba(255, 255, 255, 0.4) 50%, rgba(255, 255, 255, 0) 52%);
            animation: 6s glint linear backwards infinite;
            animation-delay: -3s;
        }

        @keyframes glint {
            0% {
                left: -120%;
            }

            8% {
                left: 50%;
            }

            100% {
                left: 50%;
            }
        }


        @keyframes border-glint {
            0% {
                background-position: 0px, -250px;
            }

            25% {
                background-position: 0px, -200px;
            }

            75% {
                background-position: 0px, 50px;
            }

            100% {
                background-position: 0px, 50px;
            }
        }

    </style>
</head>

<body>
    <!-- Theme Toggle -->
    <div style="position: fixed; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; text-align: right;">
        <div>
            <span class="switchtxt">FF</span>
            <label class="switch">
                <input type="checkbox" id="imageSwitch">
                <span class="slider"></span>
            </label>
            <span class="switchtxt">SO</span>
        </div>

        <div>
            <span class="switchtxt">SWAP</span>
            <label class="switch">
                <input type="checkbox" id="swapSwitch">
                <span class="slider"></span>
            </label>
        </div>
    </div>


    <h1>Chess'owa</h1>

    <div id="game">
        <div class="panel" id="playerPanel">
            <div id="playerStatus"></div>
            <div id="playerLastSpell"><b>Last Spell:</b> None</div><br>
            <div id="playerHand"></div><br>
            <div id="playerGraveyard"></div>
        </div>

        <div id="board"></div>

        <div class="panel" id="aiPanel">
            <div id="aiStatus"></div>
            <div id="aiLastSpell"><b>Last Spell:</b> None</div><br>
            <div id="aiHand"></div><br>
            <div id="aiGraveyard"></div>
        </div>
    </div>

    <div class="panel" id="spells"></div>
    <br><button onclick="endTurn()" id="endTurn">End Turn</button>

    <div id="modal">
        <div>
            <p>King Ability</p>
            <button onclick="resolveKingChoice('damage')">Deal 200 Damage</button>
            <button onclick="resolveKingChoice('mp')">Reduce Enemy MP by 2</button>
        </div>
    </div>

    <script>
        /* ================= CONSTANTS ================= */
        const THEME_KEY = "board_theme";
        const SWAP_KEY = "swap_sides";

        const ICON = {
            player: {
                king: "♔",
                queen: "♕",
                rook: "♖",
                bishop: "♗",
                knight: "♘",
                pawn: "♙"
            },
            ai: {
                king: "♚",
                queen: "♛",
                rook: "♜",
                bishop: "♝",
                knight: "♞",
                pawn: "♟"
            }
        };

        const modal = document.getElementById("modal");

        const PIECE_IMAGES = {
            player: {
                pawn: [
                    "images/player/pawn-1.png",
                    "images/player/pawn-2.png",
                    "images/player/pawn-3.png",
                    "images/player/pawn-4.png",
                    "images/player/pawn-5.png",
                    "images/player/pawn-6.png",
                    "images/player/pawn-7.png",
                    "images/player/pawn-8.png"
                ],
                rook: [
                    "images/player/rook-1.png",
                    "images/player/rook-2.png"
                ],
                bishop: [
                    "images/player/bishop-1.png",
                    "images/player/bishop-2.png"
                ],
                knight: [
                    "images/player/knight-1.png",
                    "images/player/knight-2.png"
                ],
                queen: ["images/player/queen-1.png"],
                king: ["images/player/king-1.png"]
            },
            ai: {
                pawn: [
                    "images/ai/pawn-1.png",
                    "images/ai/pawn-2.png",
                    "images/ai/pawn-3.png",
                    "images/ai/pawn-4.png",
                    "images/ai/pawn-5.png",
                    "images/ai/pawn-6.png",
                    "images/ai/pawn-7.png",
                    "images/ai/pawn-8.png"
                ],
                rook: [
                    "images/ai/rook-1.png",
                    "images/ai/rook-2.png"
                ],
                bishop: [
                    "images/ai/bishop-1.png",
                    "images/ai/bishop-2.png"
                ],
                knight: [
                    "images/ai/knight-1.png",
                    "images/ai/knight-2.png"
                ],
                queen: ["images/ai/queen-1.png"],
                king: ["images/ai/king-1.png"]
            }
        };

        const ALT_PIECE_IMAGES = {
            player: {
                pawn: [
                    "images_alt/player/pawn-1.png",
                    "images_alt/player/pawn-2.png",
                    "images_alt/player/pawn-3.png",
                    "images_alt/player/pawn-4.png",
                    "images_alt/player/pawn-5.png",
                    "images_alt/player/pawn-6.png",
                    "images_alt/player/pawn-7.png",
                    "images_alt/player/pawn-8.png"
                ],
                rook: ["images_alt/player/rook-1.png", "images_alt/player/rook-2.png"],
                bishop: ["images_alt/player/bishop-1.png", "images_alt/player/bishop-2.png"],
                knight: ["images_alt/player/knight-1.png", "images_alt/player/knight-2.png"],
                queen: ["images_alt/player/queen-1.png"],
                king: ["images_alt/player/king-1.png"]
            },
            ai: {
                pawn: [
                    "images_alt/ai/pawn-1.png",
                    "images_alt/ai/pawn-2.png",
                    "images_alt/ai/pawn-3.png",
                    "images_alt/ai/pawn-4.png",
                    "images_alt/ai/pawn-5.png",
                    "images_alt/ai/pawn-6.png",
                    "images_alt/ai/pawn-7.png",
                    "images_alt/ai/pawn-8.png"
                ],
                rook: ["images_alt/ai/rook-1.png", "images_alt/ai/rook-2.png"],
                bishop: ["images_alt/ai/bishop-1.png", "images_alt/ai/bishop-2.png"],
                knight: ["images_alt/ai/knight-1.png", "images_alt/ai/knight-2.png"],
                queen: ["images_alt/ai/queen-1.png"],
                king: ["images_alt/ai/king-1.png"]
            }
        };

        const SPELLS = {
            Flare: {
                cost: 3,
                dmg: 200
            },
            Ultima: {
                cost: 5,
                dmg: 400
            },
            Requiem: {
                cost: 7,
                dmg: 800
            },
            'Life I': {
                cost: 2,
                revive: 1
            },
            'Life II': {
                cost: 4,
                revive: 2
            },
            'Haste I': {
                cost: 3,
                draw: 1
            },
            'Haste II': {
                cost: 5,
                draw: 2
            },
            Dispel: {
                cost: 4
            },
            Break: {
                cost: 7
            }
        };

        let ACTIVE_IMAGES = PIECE_IMAGES;

        const BASE = {
            king: 200,
            queen: 150,
            rook: 150,
            bishop: 100,
            knight: 100,
            pawn: 50
        };
        const inB = (r, c) => r >= 0 && c >= 0 && r < 8 && c < 8;
        const adj = (r, c) => [
            [r - 1, c],
            [r + 1, c],
            [r, c - 1],
            [r, c + 1]
        ].filter(x => inB(x[0], x[1]));

        /* ================= STATE ================= */
        let G = {
            turn: "player",
            board: [...Array(8)].map(() => Array(8).fill(null)),
            player: {
                hp: 10000,
                mp: 0,
                hand: [],
                deck: [],
                dead: [],
                pawn: 0,
                lastSpell: ""
            },
            ai: {
                hp: 10000,
                mp: 0,
                hand: [],
                deck: [],
                dead: [],
                pawn: 0,
                lastSpell: "",
                nextSpell: null,
                extraPlacement: false
            },
            ids: {
                player: {},
                ai: {}
            },
            placements: 1,
            spellUsed: false,
            kingPending: null,
            gameOver: false
        };

        function uid(o, t) {
            G.ids[o][t] = (G.ids[o][t] || 0) + 1;
            return `${o}-${t}-${G.ids[o][t]}`
        }

        let reviveQueue = [];

        let lastPlacedR = null;
        let lastPlacedC = null;

        /* ================= SETUP ================= */

        function makeDeck(o) {
            let d = [{
                type: "king"
            }, {
                type: "queen"
            }];
            ["rook", "bishop", "knight"].forEach(p => {
                d.push({
                    type: p
                }, {
                    type: p
                })
            });
            for (let i = 0; i < 8; i++) d.push({
                type: "pawn"
            });
            d.forEach(x => x.owner = o);
            return d;
        }
        G.player.deck = makeDeck("player");
        G.ai.deck = makeDeck("ai");

        function draw(player) {
            if (player.deck.length === 0) return;

            const idx = Math.floor(Math.random() * player.deck.length);
            const card = player.deck.splice(idx, 1)[0];

            // Assign ID first
            card.id = uid(card.owner, card.type);

            // Then assign the image
            card.img = assignPieceImage(card.owner, card.type, card.id);

            player.hand.push(card);
        }

        function drawUntil(p, min = 3) {
            while (p.hand.length < min && p.deck.length) {
                const card = p.deck.splice(Math.floor(Math.random() * p.deck.length), 1)[0];

                // Assign ID first
                card.id = uid(card.owner, card.type);

                // Then assign the image
                card.img = assignPieceImage(card.owner, card.type, card.id);

                p.hand.push(card);
            }
        }

        function canCastSpell(caster, spellName) {
            const s = SPELLS[spellName];
            if (!s) return false;
            if (caster.mp < s.cost) return false;

            // Special restrictions
            if (spellName === "Haste I" && caster.hand.length === 0) return false;
            if (spellName === "Haste II" && caster.hand.length < 2) return false;
            if (spellName === "Life I" && caster.dead.length < 1) return false;
            if (spellName === "Life II" && caster.dead.length < 2) return false;

            return true;
        }

        function selectRevive(owner, index) {
            if (G.turn !== "player") return;
            if (!reviveQueue.length) return;

            const p = G.player.dead.splice(index, 1)[0];
            G.player.hand.push(p);
            reviveQueue.pop();

            if (!reviveQueue.length) {
                render();
            }
        }

        /* ================= HELPERS ================= */
        function loadSavedTheme() {
            const theme = localStorage.getItem(THEME_KEY);
            const swap = localStorage.getItem(SWAP_KEY) === "true";

            // Theme
            if (theme === "alt") {
                ACTIVE_IMAGES = ALT_PIECE_IMAGES;
                document.getElementById("imageSwitch").checked = true;
            } else {
                ACTIVE_IMAGES = PIECE_IMAGES;
                document.getElementById("imageSwitch").checked = false;
            }

            // Swap sides
            document.getElementById("swapSwitch").checked = swap;
            updateSpellButtonText();
            updateLastSpellDisplay();
        }

        document.getElementById("imageSwitch").addEventListener("change", function() {
            const isAlt = this.checked;

            if (isAlt) {
                ACTIVE_IMAGES = ALT_PIECE_IMAGES;
                localStorage.setItem(THEME_KEY, "alt");
            } else {
                ACTIVE_IMAGES = PIECE_IMAGES;
                localStorage.setItem(THEME_KEY, "default");
            }

            // 1. Load saved toggle values
            loadSavedTheme();

            // 2. NOW that decks already exist, update images
            updateAllPieceImages();

            updateSpellButtonText();
            updateLastSpellDisplay();
            updateAiLastSpellDisplay();

            // 3. Render UI
            render();
        });

        function updateSpellButtonText() {
            const spellsDiv = document.getElementById("spells");
            spellsDiv.innerHTML = "<b>Spells</b><br>";

            Object.keys(SPELLS).forEach(baseName => {
                const s = SPELLS[baseName];
                const b = document.createElement("button");

                const displayName = getSpellName(baseName);

                b.textContent = displayName.toUpperCase() + " (" + s.cost + " MP)";
                b.classList.add("shiny-button");

                b.onclick = () => {
                    if (G.turn !== "player") return;
                    castSpell(G.player, G.ai, baseName); // IMPORTANT: still use baseName
                };

                if (!canCastSpell(G.player, baseName) || G.spellUsed) {
                    b.disabled = true;
                    b.style.opacity = 0.4;
                }

                spellsDiv.appendChild(b);
            });
        }

        function getSpellName(baseName) {
            const swap = document.getElementById("swapSwitch").checked;
            const image = document.getElementById("imageSwitch").checked;

            // IMAGE SWITCH OVERRIDE (highest priority)
            if (image) {
                const imageMap = {
                    "Flare": "Flame Charge I",
                    "Ultima": "Flame Charge II",
                    "Requiem": "Flame Charge III",
                    "Life I": "Revive I",
                    "Life II": "Revive II",
                    "Haste I": "Reinforce I",
                    "Haste II": "Reinforce II",
                    "Dispel": "Enfeeble I",
                    "Break": "Enfeeble II"
                };
                return imageMap[baseName] || baseName;
            }

            // SWAP ONLY (rename first three)
            if (swap) {
                const swapMap = {
                    "Flare": "Barrage",
                    "Ultima": "Omnislash",
                    "Requiem": "Renzokuken"
                };
                return swapMap[baseName] || baseName;
            }

            // DEFAULT
            return baseName;
        }

        function updateLastSpellDisplay() {
            const lastSpellDiv = document.getElementById("playerLastSpell");
            if (!G.player.lastSpell) {
                lastSpellDiv.innerHTML = "<b>Last Spell:</b> None";
            } else {
                lastSpellDiv.innerHTML = "<b>Last Spell:</b> " + getSpellName(G.player.lastSpell);
            }
        }

        function updateAiLastSpellDisplay() {
            const div = document.getElementById("aiLastSpell");
            if (!G.ai.lastSpell) div.innerHTML = "<b>Last Spell:</b> None";
            else div.innerHTML = "<b>Last Spell:</b> " + getSpellName(G.ai.lastSpell);
        }

        const ortho = (r, c) => [
            r > 0 ? [r - 1, c] : null,
            r < 7 ? [r + 1, c] : null,
            c > 0 ? [r, c - 1] : null,
            c < 7 ? [r, c + 1] : null
        ];

        function wouldSurroundEnemy(r, c, owner) {
            if (G.board[r][c]) return 0;

            const enemy = owner === "player" ? "ai" : "player";

            // 1️⃣ simulate placement
            G.board[r][c] = {
                owner
            };

            let captured = 0;
            const checked = new Set();

            adj(r, c).forEach(([rr, cc]) => {
                const p = G.board[rr][cc];
                if (!p || p.owner !== enemy) return;

                const key = rr + "," + cc;
                if (checked.has(key)) return;

                const group = getGroup(rr, cc, enemy);
                group.forEach(([gr, gc]) => checked.add(gr + "," + gc));

                if (!groupHasLiberty(group)) {
                    captured += group.length;
                }
            });

            // 2️⃣ undo simulation
            G.board[r][c] = null;

            return captured;
        }

        function countEnemyAdj(r, c, owner) {
            return adj(r, c).filter(([rr, cc]) => {
                const p = G.board[rr][cc];
                return p && p.owner !== owner;
            }).length;
        }

        function emptyAdj(r, c) {
            return adj(r, c).filter(([rr, cc]) => !G.board[rr][cc]);
        }

        // Is this piece about to be surrounded next turn?
        function dangerEscapeSquares(r, c, owner) {
            const enemies = countEnemyAdj(r, c, owner);
            if (enemies < 3) return [];
            return emptyAdj(r, c);
        }

        function findDefenseMoves(owner) {
            const moves = [];

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const p = G.board[r][c];
                    if (!p || p.owner !== owner) continue;

                    const escapes = dangerEscapeSquares(r, c, owner);
                    escapes.forEach(([er, ec]) => {
                        moves.push({
                            r: er,
                            c: ec,
                            protect: true,
                            score: 2000
                        });
                    });
                }
            }

            return moves;
        }

        function countLiberties(group) {
            const libs = new Set();

            group.forEach(([r, c]) => {
                adj(r, c).forEach(([rr, cc]) => {
                    if (!G.board[rr][cc]) libs.add(rr + "," + cc);
                });
            });

            return libs.size;
        }

        function assignPieceImage(owner, type, id) {
            const swap = document.getElementById("swapSwitch").checked;

            // Apply swap here
            const actualOwner = swap ?
                (owner === "player" ? "ai" : "player") :
                owner;

            const pool = ACTIVE_IMAGES[actualOwner][type];
            if (!pool || !pool.length) return "";

            const idNumber = parseInt(id.split("-")[2]) - 1;
            return pool[idNumber % pool.length];
        }

        function resolveSurroundForPlacement(owner, r, c) {
            const enemy = owner === "player" ? "ai" : "player";
            const kills = [];

            adj(r, c).forEach(([rr, cc]) => {
                const p = G.board[rr][cc];
                if (!p || p.owner !== enemy) return;

                const surrounded = adj(rr, cc).every(([r2, c2]) => {
                    const q = G.board[r2][c2];
                    return q && q.owner === owner; // only enemy counts
                });

                if (surrounded) kills.push([rr, cc, p]);
            });

            kills.forEach(([rr, cc, p]) => {
                G.board[rr][cc] = null;
                (p.owner === "player" ? G.player : G.ai).dead.push(p);
            });
        }

        function recalculateAllAttack() {
            // 1️⃣ Reset to base (unless broken)
            G.board.flat().forEach(p => {
                if (!p) return;

                if (p.broken) {
                    p.atk = 0;
                } else {
                    p.atk = BASE[p.type];
                }
            });

            // 2️⃣ Reapply all auras
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = G.board[r][c];
                    if (!piece || piece.silenced || piece.broken) continue;

                    adj(r, c).forEach(([rr, cc]) => {
                        const neighbor = G.board[rr][cc];
                        if (!neighbor || neighbor.silenced || neighbor.broken) return;

                        // Bishop buff
                        if (
                            neighbor.type === "bishop" &&
                            neighbor.owner === piece.owner
                        ) {
                            piece.atk += 50;
                        }

                        // Queen debuff
                        if (neighbor.type === "queen") {
                            piece.atk -= 50;
                        }
                    });
                }
            }

            // 3️⃣ Clamp to 0 minimum
            G.board.flat().forEach(p => {
                if (!p) return;
                if (p.atk < 0) p.atk = 0;
            });
        }

        /* ================= ABILITIES ================= */
        function applyAbility(p, r, c) {
            if (p.silenced) return;
            let me = p.owner === "player" ? G.player : G.ai;
            let op = p.owner === "player" ? G.ai : G.player;

            if (p.type === "queen") {
                me.mp = Math.min(7, me.mp + 1);
                ortho(r, c).forEach(a => {
                    if (a) {
                        let q = G.board[a[0]][a[1]];
                        if (q) q.atk -= 50;
                    }
                });
            }

            if (p.type === "bishop") {
                adj(r, c).forEach(([rr, cc]) => {
                    const q = G.board[rr][cc];
                    if (q && q.owner === p.owner) q.atk += 50;
                });
            }

            if (p.type === "knight") {
                let targets = [];
                ortho(r, c).forEach(a => {
                    if (a) {
                        let q = G.board[a[0]][a[1]];
                        if (q && q.owner !== p.owner) targets.push(a);
                    }
                });
                if (targets.length) {
                    let [tr, tc] = targets[Math.random() * targets.length | 0];
                    let killed = G.board[tr][tc];
                    G.board[tr][tc] = null;
                    op.dead.push(killed);

                    if (p.owner === "player") {
                        popup("🗡️ Captured", "dodgerblue");
                        return;
                    } else {
                        popup("🗡️ Captured", "firebrick");
                    }
                }
            }
        }


        function resolveKingChoice(choice) {
            if (choice === "damage") {
                G.ai.hp -= 200;
                popup("⚔️ Opponent loses HP", "dodgerblue");
            } else {
                G.ai.mp = Math.max(0, G.ai.mp - 2);
                popup("✨ Opponent loses MP", "dodgerblue");
            }
            modal.style.display = "none";
            G.kingPending = null;

            // ⭐ FINALIZE placement flow
            resolveSurroundAt(lastPlacedR, lastPlacedC, "player");
            recalculateAllAttack();
            render();
        }

        /* ================= SURROUND (MULTI-REMOVE SAFE) ================= */
        // Check only enemy pieces around a new placement
        /* ================= GO STYLE SURROUND ================= */
        function getGroup(r, c, owner) {
            const visited = new Set();
            const stack = [
                [r, c]
            ];
            const group = [];

            while (stack.length) {
                const [rr, cc] = stack.pop();
                const key = rr + "," + cc;
                if (visited.has(key)) continue;
                visited.add(key);

                const p = G.board[rr][cc];
                if (!p || p.owner !== owner) continue;

                group.push([rr, cc]);

                adj(rr, cc).forEach(([nr, nc]) => {
                    const np = G.board[nr][nc];
                    if (np && np.owner === owner) stack.push([nr, nc]);
                });
            }

            return group;
        }

        function groupHasLiberty(group) {
            return group.some(([r, c]) =>
                adj(r, c).some(([nr, nc]) => !G.board[nr][nc])
            );
        }

        function resolveSurroundAt(r, c, owner) {
            const enemy = owner === "player" ? "ai" : "player";

            let enemyCaptured = false;
            const checked = new Set();

            // 1️⃣ Capture enemy groups first
            adj(r, c).forEach(([rr, cc]) => {
                const p = G.board[rr][cc];
                if (!p || p.owner !== enemy) return;

                const key = rr + "," + cc;
                if (checked.has(key)) return;

                const group = getGroup(rr, cc, enemy);
                group.forEach(([gr, gc]) => checked.add(gr + "," + gc));

                if (!groupHasLiberty(group)) {
                    captureGroup(group);
                    enemyCaptured = true;
                }
            });

            // 2️⃣ Check suicide on placed group
            const myGroup = getGroup(r, c, owner);

            if (!groupHasLiberty(myGroup) && !enemyCaptured) {
                // SUICIDE → undo placement
                myGroup.forEach(([gr, gc]) => {
                    const killed = G.board[gr][gc];
                    G.board[gr][gc] = null;
                    (killed.owner === "player" ? G.player : G.ai).dead.push(killed);
                    popup(`Suicide: ${ICON[killed.owner][killed.type]}`, "purple");
                });
            }
        }

        function surroundScore(r, c, owner) {
            if (G.board[r][c]) return -Infinity;

            const enemy = owner === "player" ? "ai" : "player";

            // simulate placement
            G.board[r][c] = {
                owner
            };

            let score = 0;
            const checked = new Set();

            adj(r, c).forEach(([rr, cc]) => {
                const p = G.board[rr][cc];
                if (!p || p.owner !== enemy) return;

                const key = rr + "," + cc;
                if (checked.has(key)) return;

                const group = getGroup(rr, cc, enemy);
                group.forEach(([gr, gc]) => checked.add(gr + "," + gc));

                const liberties = countLiberties(group);

                // scoring based on danger level
                if (liberties === 0) score += 500 + group.length * 100; // kill
                else if (liberties === 1) score += 200 + group.length * 50; // almost dead
                else if (liberties === 2) score += 80 + group.length * 20; // pressure
                else score += 10;
            });

            // anti-suicide
            const myGroup = getGroup(r, c, owner);
            const myLib = countLiberties(myGroup);

            if (myLib === 0) score -= 1000;

            // undo simulation
            G.board[r][c] = null;

            return score;
        }

        function enemyProximity(r, c, owner) {
            const enemy = owner === "player" ? "ai" : "player";
            let best = Infinity;

            for (let rr = 0; rr < 8; rr++) {
                for (let cc = 0; cc < 8; cc++) {
                    const p = G.board[rr][cc];
                    if (p && p.owner === enemy) {
                        const d = Math.abs(rr - r) + Math.abs(cc - c);
                        best = Math.min(best, d);
                    }
                }
            }

            return best === Infinity ? 0 : Math.max(0, 6 - best);
        }

        function captureGroup(group, owner) {
            group.forEach(([r, c]) => {
                const killed = G.board[r][c];
                G.board[r][c] = null;
                (killed.owner === "player" ? G.player : G.ai).dead.push(killed);
            });


            recalculateAllAttack();

            if (owner === "player") {
                popup("🗡️ Captured", "dodgerblue");
                return;
            } else {
                popup("🗡️ Captured", "firebrick");
            }
        }

        /* ================= POPUP ================= */
        function showDamage(amount, cb, color = "dodgerblue") {
            queuePopup("⚔️ " + amount, color, 1500, cb);
        }

        function aiShowDamage(amount, cb, color = "firebrick") {
            queuePopup("⚔️ " + amount, color, 1500, cb);
        }

        function popup(text, color = "red") {
            queuePopup(text, color, 1500);
        }

        /* ================= POPUP QUEUE ================= */
        const popupQueue = [];
        let popupActive = false;

        function queuePopup(text, color = "red", duration = 1500, cb = null) {
            popupQueue.push({
                text,
                color,
                duration,
                cb
            });
            processPopupQueue();
        }

        function processPopupQueue() {
            if (popupActive || !popupQueue.length) return;

            popupActive = true;
            const {
                text,
                color,
                duration,
                cb
            } = popupQueue.shift();

            const d = document.createElement("div");
            d.className = "damage-popup";
            d.style.color = color;
            d.textContent = text;
            document.body.appendChild(d);

            requestAnimationFrame(() => d.classList.add("show"));

            setTimeout(() => {
                d.remove();
                popupActive = false;
                cb && cb();
                processPopupQueue();
            }, duration);
        }

        /* ================= SPELLS ================= */

        function revive(owner, n) {
            let side = owner === "player" ? G.player : G.ai;
            while (n-- && side.dead.length) side.hand.push(side.dead.pop());
        }

        function dispel(BreakAtk) {
            G.board.flat().forEach(p => {
                if (p) p.atk = BreakAtk ? 0 : BASE[p.type]
            });
        }

        function castSpell(caster, target, name) {
            if (!canCastSpell(caster, name) || G.spellUsed) return;

            const s = SPELLS[name];
            caster.mp -= s.cost;
            G.spellUsed = true;
            caster.lastSpell = name;

            if (s.dmg) {
                target.hp -= s.dmg;
                if (caster === G.player) {
                    popup("🔥 " + getSpellName(caster.lastSpell), "dodgerblue");
                } else {
                    popup("🔥 " + getSpellName(caster.lastSpell), "firebrick");
                }
            }

            if (s.revive) {
                if (caster === G.player) {
                    reviveQueue = Array(s.revive).fill(true);
                    popup("Select pieces to revive", "dodgerblue");
                } else {
                    for (let i = 0; i < s.revive; i++) {
                        const g = caster.dead.pop();
                        if (g) caster.hand.push(g);
                        popup("🪽 " + getSpellName(caster.lastSpell), "firebrick");
                    }
                }
            }

            if (s.draw) {
                for (let i = 0; i < s.draw; i++) draw(caster);
                if (caster === G.player) {
                    popup("💫 " + getSpellName(caster.lastSpell), "dodgerblue");
                } else {
                    popup("💫 " + getSpellName(caster.lastSpell), "firebrick");
                }
            }

            if (name === "Dispel") {
                G.board.flat().forEach(p => {
                    if (!p) return;

                    p.silenced = true;

                    // Only reset attack if NOT broken
                    if (!p.broken) {
                        p.atk = BASE[p.type];
                    }
                });

                if (caster === G.player) {
                    popup("🚫 " + getSpellName("Dispel"), "dodgerblue");
                } else {
                    popup("🚫 " + getSpellName("Dispel"), "firebrick");
                }

                recalculateAllAttack();
            }

            if (name === "Break") {
                G.board.flat().forEach(p => {
                    if (!p) return;
                    p.silenced = true;
                    p.broken = true;
                    p.atk = 0;
                });

                if (caster === G.player) {
                    popup("⛓️‍💥  " + getSpellName("Break"), "dodgerblue");
                } else {
                    popup("⛓️‍💥  " + getSpellName("Break"), "firebrick");
                }

                recalculateAllAttack();
            }

            if (caster === G.player) {
                updateLastSpellDisplay();
            } else {
                updateAiLastSpellDisplay();
            }

            render();
        }

        /* ================= TURN FLOW ================= */
        function startTurn(o) {
            G.turn = o;
            G.placements = 1;
            G.spellUsed = false;
            sel = null;

            G.board.flat().forEach(p => {
                if (p && p.owner === o && p.type === "rook" && !p.silenced) {
                    p.atk += 50;
                }
            });
        }

        let sel = null;

        function placePiece(owner, card, r, c) {
            if (G.kingPending) return;
            if (owner === "player" && G.placements <= 0) return;
            if (G.gameOver || G.board[r][c]) return;

            const piece = {
                id: card.id,
                owner,
                type: card.type,
                atk: BASE[card.type],
                img: card.img,
                silenced: false,
                broken: false
            };

            G.board[r][c] = piece;

            // REMOVE the card from hand
            if (owner === "player") {
                const index = G.player.hand.indexOf(card);
                if (index !== -1) G.player.hand.splice(index, 1);
            } else {
                const index = G.ai.hand.indexOf(card);
                if (index !== -1) G.ai.hand.splice(index, 1);
            }

            // Gain MP
            const playerObj = owner === "player" ? G.player : G.ai;
            playerObj.mp = Math.min(7, playerObj.mp + 1);

            // Pawn bonus
            if (card.type === "pawn") {
                playerObj.pawn++;

                if (playerObj.pawn % 3 === 0) {
                    if (owner === "player") {
                        G.placements += 1;
                    } else {
                        G.ai.extraPlacement = true;
                    }
                }
            }

            // King ability
            if (owner === "player" && card.type === "king") {
                // Decrease placements immediately
                G.placements--;
                if (G.placements <= 0) sel = null;

                G.kingPending = {
                    piece,
                    r,
                    c
                };
                lastPlacedR = r;
                lastPlacedC = c;

                modal.style.display = "flex";
                render();
                let eT = document.getElementById("endTurn");
                eT.classList.add("glint", "shiny-button");
                return;
            }

            // ===== AI KING ABILITY =====
            if (owner === "ai" && card.type === "king") {

                const requiemCost = SPELLS["Requiem"].cost;
                const playerMP = G.player.mp;

                let useMPDrain = false;

                // 1️⃣ If player cannot meaningfully lose MP
                if (playerMP < 2) {
                    useMPDrain = false; // always damage
                }

                // 2️⃣ If player is within 2 MP of casting Requiem
                else if (playerMP >= requiemCost - 2) {
                    useMPDrain = true;
                }

                // 3️⃣ Otherwise bias toward damage but sometimes drain
                else {
                    useMPDrain = Math.random() < 0.35;
                }

                if (useMPDrain) {
                    G.player.mp = Math.max(0, G.player.mp - 2);
                    popup("✨ Player loses MP", "firebrick");
                } else {
                    G.player.hp -= 200;
                    popup("⚔️ Player loses HP", "firebrick");
                }

                render();
            }


            applyAbility(piece, r, c);
            recalculateAllAttack();

            // Surround enemies
            resolveSurroundAt(r, c, owner);

            // Decrease placements for player
            if (owner === "player") {
                G.placements--;
                let eT = document.getElementById("endTurn");
                if (G.placements <= 0) {
                    sel = null; // clear selection if no placements left
                    eT.classList.add("glint", "shiny-button");
                }
            }

            render();
        }

        function endTurn() {
            let eT = document.getElementById("endTurn");
            eT.classList.remove("glint", "shiny-button");
            let dmg = G.board.flat().reduce((s, p) => p && p.owner === "player" ? s + p.atk : s, 0);
            showDamage(dmg, () => {
                G.ai.hp -= dmg;
                if (checkWin()) return;
                aiTurn();
            });
        }

        function checkWin() {
            if (G.player.hp <= 0 && G.ai.hp <= 0) {
                alert("Draw!");
                location.reload();
                return true;
            }
            if (G.player.hp <= 0) {
                alert("AI Wins!");
                location.reload();
                return true;
            }
            if (G.ai.hp <= 0) {
                alert("Player Wins!");
                location.reload();
                return true;
            }
            return false;
        }

        /* ================= AI TURN ================= */
        function aiFirstMove() {
            drawUntil(G.ai, 3);

            // Get all empty cells and shuffle them for unpredictability
            let empties = [];
            for (let r = 0; r < 8; r++)
                for (let c = 0; c < 8; c++)
                    if (!G.board[r][c]) empties.push([r, c]);
            empties = shuffle(empties);

            if (!G.ai.hand.length || !empties.length) return;

            // Pick best spot based on surroundScore, fallback to random
            let best = empties[0],
                bestScore = -1;
            empties.forEach(([r, c]) => {
                const score = surroundScore(r, c, "ai"); // use AI as the placing owner
                if (score > bestScore) {
                    bestScore = score;
                    best = [r, c];
                }
            });

            const [r, c] = best;

            // Place first card
            const card = G.ai.hand.shift();
            const piece = {
                id: card.id,
                owner: "ai",
                type: card.type,
                atk: BASE[card.type],
                img: card.img
            };

            G.board[r][c] = piece;

            applyAbility(piece, r, c);
            resolveSurroundAt(r, c, piece.owner);

            render();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function aiPlacementScore(r, c, owner) {
            const baseScore = surroundScore(r, c, owner); // how many enemy pieces it would surround
            const centerWeight = 4 - Math.abs(3.5 - r) - Math.abs(3.5 - c); // max ~4 at center
            return baseScore + centerWeight * 0.5; // blend center preference
        }


        /* ================= AI TURN ================= */
        function aiTurn() {
            startTurn("ai");
            drawUntil(G.ai, 3);

            if (!G.ai.nextSpell) aiChooseSpell();

            /* ================= COLLECT EMPTY CELLS ================= */
            const empties = [];
            for (let r = 0; r < 8; r++)
                for (let c = 0; c < 8; c++)
                    if (!G.board[r][c]) empties.push([r, c]);

            if (!G.ai.hand.length || !empties.length) return;

            let candidateMoves = [];


            /* ================= ⚔️ 2. IMMEDIATE KILLS ================= */
            if (!candidateMoves.length) {
                empties.forEach(([r, c]) => {
                    const kills = wouldSurroundEnemy(r, c, "ai");
                    if (kills > 0) {
                        candidateMoves.push({
                            r,
                            c,
                            score: 2000 + kills * 200,
                            reason: "kill"
                        });
                    }
                });
            }

            /* ================= 🎯 3. SURROUND SETUP ================= */
            if (!candidateMoves.length) {
                let bestScore = -Infinity;

                empties.forEach(([r, c]) => {
                    const score =
                        surroundScore(r, c, "ai") * 5 +
                        enemyProximity(r, c, "ai") * 3;
                    if (score > bestScore) {
                        bestScore = score;
                        candidateMoves = [{
                            r,
                            c,
                            score,
                            reason: "setup"
                        }];
                    } else if (score === bestScore) {
                        candidateMoves.push({
                            r,
                            c,
                            score,
                            reason: "setup"
                        });
                    } // If bestScore is 0, still allow setup — we will refine with proximity
                });
            }

            /* ================= 🎲 4. PURE RANDOM FALLBACK ================= */
            if (!candidateMoves.length) {
                const [r, c] = empties[Math.floor(Math.random() * empties.length)];
                candidateMoves = [{
                    r,
                    c,
                    reason: "random"
                }];
            }

            /* ================= 🛡️ 1. ANTI-SURROUND DEFENSE (NEW) ================= */
            if (!candidateMoves.length) {
                empties.forEach(([r, c]) => {
                    adj(r, c).forEach(([rr, cc]) => {
                        const p = G.board[rr][cc];
                        if (!p || p.owner !== "ai") return;

                        const enemyCount = countEnemyAdj(rr, cc, "ai");
                        const emptyCount = emptyAdj(rr, cc).length;

                        if (enemyCount === 3 && emptyCount === 1) {
                            candidateMoves.push({
                                r,
                                c,
                                reason: "defense"
                            });
                        }
                    });
                });
            }

            /* ================= EXECUTE MOVE ================= */
            function aiPlaceOnce() {
                const move = candidateMoves[Math.floor(Math.random() * candidateMoves.length)]; const cardIndex = Math.floor(Math.random() * G.ai.hand.length); const card = G.ai.hand[cardIndex]; placePiece("ai", card, move.r, move.c);
                render();
                return true;
            }

            function aiPlaceSequence() {

                // First placement
                const placed = aiPlaceOnce();

                if (!placed) return;

                // Check AFTER placement if pawn triggered bonus
                if (G.ai.extraPlacement) {
                    G.ai.extraPlacement = false;

                    setTimeout(() => {
                        aiPlaceOnce();
                    }, 1000);
                }
            }
            
            setTimeout(() => {
                    aiPlaceSequence();
                }, 1000);
            
            /* ================= SPELL PHASE ================= */
            const spellName = aiCastSpell();

            /* ================= SPELL POPUP → DAMAGE FLOW ================= */
            const resolveAiDamage = () => {
                setTimeout(() => {

                    const dmg = G.board.flat().reduce(
                        (s, p) => (p && p.owner === "ai" ? s + p.atk : s),
                        0
                    );

                    aiShowDamage(dmg, () => {
                        G.player.hp -= dmg;
                        if (checkWin()) return;
                        startTurn("player");
                        drawUntil(G.player, 3);
                        render();
                    });

                }, 1000);
            };
            
            setTimeout(() => {
                resolveAiDamage();
                }, 1000);
        }



        /* ================= AI SPELL LOGIC ================= */
        function aiChooseSpell() {
            // Pick a random spell to "plan" — exclude life1/life2
            const candidateSpells = ["Flare", "Ultima", "Requiem", "Dispel", "Break"];
            G.ai.nextSpell = candidateSpells[Math.floor(Math.random() * candidateSpells.length)];
        }

        function aiCastSpell() {
            if (G.spellUsed) return null;

            if (!G.ai.nextSpell) aiChooseSpell();

            let spellToCast = G.ai.nextSpell;

            const rand = Math.random();
            if (G.ai.dead.length >= 2 && rand < 0.33 && canCastSpell(G.ai, "Life II")) {
                spellToCast = "Life II";
            } else if (G.ai.dead.length === 1 && rand < 0.33 && canCastSpell(G.ai, "Life I")) {
                spellToCast = "Life I";
            }

            if (canCastSpell(G.ai, spellToCast)) {
                castSpell(G.ai, G.player, spellToCast);

                if (spellToCast !== "Life I" && spellToCast !== "Life II") {
                    G.ai.nextSpell = null;
                }

                return spellToCast;
            }

            return null;
        }

        /* ================= RENDER ================= */
        function render() {
            // ===== PLAYER STATUS =====
            playerStatus.innerHTML = `
    <b>Player</b><br>
    HP: ${G.player.hp} MP: ${G.player.mp}<br>
    Placements: ${G.placements}
  `;

            // ===== PLAYER HAND =====
            playerHand.innerHTML = "<b>Hand</b><br>";
            G.player.hand.forEach((p, i) => {
                let b = document.createElement("button");
                b.innerHTML = `
  <div class="icon" style="width:60px;height:60px">
    <img src="${p.img}" style="width:60px;height:60px;">
  </div>
  <div class="atk handatk" style="color:#9fd3ff;">${BASE[p.type]}</div>
`;
                b.classList.add("glint", "handpadding");
                if (i === sel) b.classList.add("selected");
                b.onclick = () => {
                    if (G.turn !== "player") return;
                    if (G.placements <= 0) return;
                    sel = i;
                    render();
                };
                playerHand.appendChild(b);
            });

            // ===== PLAYER GRAVEYARD =====
            playerGraveyard.innerHTML = "<b>Graveyard</b><br>";
            G.player.dead.forEach((p, i) => {
                const span = document.createElement("span");
                span.classList.add("graveIcon");
                span.innerHTML = `
  <div class="icon" style="width:60px;height:60px">
    <img src="${p.img}" style="width:60px;height:60px;">
  </div>
  <div class="atk graveyardatk" style="color:#9fd3ff;">${BASE[p.type]}</div>
`;
                span.onclick = () => selectRevive('player', i);
                playerGraveyard.appendChild(span);
            });

            // ===== AI STATUS =====
            aiStatus.innerHTML = `
    <b>Opponent</b><br>
    HP: ${G.ai.hp} MP: ${G.ai.mp}<br>
    Placements: ${G.placements}
  `;

            // ===== AI HAND =====
            aiHand.innerHTML = "<b>Hand</b><br>";
            G.ai.hand.forEach((p, i) => {
                const b = document.createElement("button");
                b.innerHTML = `
  <div class="icon" style="width:60px;height:60px">
    <img src="${p.img}" style="width:60px;height:60px;">
  </div>
  <div class="atk handatk" style="color:#ff9f9f;">${BASE[p.type]}</div>
`;
                b.classList.add("handpadding");
                b.disabled = true; // AI hand cards are not selectable
                aiHand.appendChild(b);
            });

            // ===== AI GRAVEYARD =====
            aiGraveyard.innerHTML = "<b>Graveyard</b><br>";
            G.ai.dead.forEach(p => {
                const span = document.createElement("span");
                aiGraveyard.appendChild(span);
                span.classList.add("graveIcon");
                span.innerHTML = `
  <div class="icon" style="width:60px;height:60px">
    <img src="${p.img}" style="width:60px;height:60px;">
  </div>
  <div class="atk graveyardatk" style="color:#ff9f9f;">${BASE[p.type]}</div>
`;
            });

            // ===== BOARD =====
            board.innerHTML = "";
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    let d = document.createElement("div");
                    d.className = "cell";
                    let p = G.board[r][c];
                    if (p) {
                        d.classList.add(p.owner);
                        d.innerHTML = `
  <div class="icon">
    <img src="${p.img}" alt="${p.type}">
  </div>
  <div class="atk">${p.atk}</div>
`;
                    }

                    d.onclick = () => {
                        if (G.turn !== "player") return;
                        if (sel === null) return;
                        if (G.placements <= 0) return;
                        const card = G.player.hand[sel];
                        if (!card) return;

                        placePiece("player", card, r, c);

                        sel = null;
                        render();
                    };

                    board.appendChild(d);
                }
            }

            // ===== SPELLS =====
            updateSpellButtonText();
            updateLastSpellDisplay();
            updateAiLastSpellDisplay();
        }

        // Decide who starts
        const first = Math.random() < 0.5 ? "player" : "ai";

        // Draw initial hands for both players
        drawUntil(G.player, 3);
        drawUntil(G.ai, 3);

        // Start first turn
        startTurn(first);

        // If AI goes first, do its first move automatically
        if (first === "ai") {
            // Place AI's first piece
            aiTurn(); // aiTurn now handles placement, abilities, spellcasting, and damage
        }

        // 1. Load saved toggle values
        loadSavedTheme();

        // 2. NOW that decks already exist, update images
        updateAllPieceImages();

        // 3. Render UI
        render();

        document.getElementById("swapSwitch").addEventListener("change", function() {
            const swap = this.checked;
            localStorage.setItem(SWAP_KEY, swap ? "true" : "false");

            // 1. Load saved toggle values
            loadSavedTheme();

            // 2. NOW that decks already exist, update images
            updateAllPieceImages();

            updateSpellButtonText();
            updateLastSpellDisplay();


            // 3. Render UI
            render();
        });

        function updateAllPieceImages() {
            const swap = document.getElementById("swapSwitch").checked;

            function getImage(p) {
                return assignPieceImage(p.owner, p.type, p.id);
            }
            // Update board
            G.board.flat().forEach(p => {
                if (!p) return;
                p.img = getImage(p);
            });

            // Update hands
            G.player.hand.forEach(p => p.img = getImage(p));
            G.ai.hand.forEach(p => p.img = getImage(p));

            // Update graveyards
            G.player.dead.forEach(p => p.img = getImage(p));
            G.ai.dead.forEach(p => p.img = getImage(p));
        }

    </script>

</body>

</html>
